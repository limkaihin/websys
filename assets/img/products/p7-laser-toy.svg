<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Laser device body -->
  <rect x="45" y="38" width="36" height="52" rx="18" fill="#3D2314"/>
  <rect x="48" y="41" width="30" height="46" rx="15" fill="#6B3C22"/>
  <!-- Lens -->
  <circle cx="63" cy="50" r="10" fill="#1a0a04"/>
  <circle cx="63" cy="50" r="7" fill="#CC2200"/>
  <circle cx="63" cy="50" r="4" fill="#FF4422"/>
  <circle cx="61" cy="48" r="1.5" fill="#fff" opacity=".7"/>
  <!-- Beam rays -->
  <line x1="63" y1="38" x2="30" y2="15" stroke="#FF4422" stroke-width="2.5" opacity=".9" stroke-linecap="round"/>
  <line x1="63" y1="38" x2="18" y2="28" stroke="#FF4422" stroke-width="1.5" opacity=".5" stroke-linecap="round"/>
  <line x1="63" y1="38" x2="25" y2="8" stroke="#FF4422" stroke-width="1" opacity=".3" stroke-linecap="round"/>
  <!-- Laser dot -->
  <circle cx="28" cy="13" r="5" fill="#FF4422" opacity=".9"/>
  <circle cx="28" cy="13" r="8" fill="#FF4422" opacity=".2"/>
  <!-- Button on device -->
  <circle cx="63" cy="75" r="7" fill="#E8651A"/>
  <circle cx="63" cy="75" r="5" fill="#F5924E"/>
  <!-- Speed mode ring -->
  <circle cx="63" cy="60" r="3" fill="#C8941A"/>
  <!-- Base -->
  <ellipse cx="63" cy="90" rx="18" ry="5" fill="#3D2314"/>
</svg>
