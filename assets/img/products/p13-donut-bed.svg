<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Outer donut shadow -->
  <ellipse cx="60" cy="95" rx="48" ry="8" fill="#3D2314" opacity=".1"/>
  <!-- Outer donut ring -->
  <circle cx="60" cy="65" r="46" fill="#F0C4A8"/>
  <!-- Fur texture outer ring (bumpy edge) -->
  <circle cx="60" cy="65" r="46" fill="none" stroke="#FAF5EE" stroke-width="6" stroke-dasharray="4,4" opacity=".6"/>
  <!-- Inner circle (the hole) -->
  <circle cx="60" cy="65" r="22" fill="#FAF5EE"/>
  <!-- Inner soft lining -->
  <circle cx="60" cy="65" r="20" fill="#F2E8D9"/>
  <!-- Fur texture inner ring -->
  <circle cx="60" cy="65" r="22" fill="none" stroke="#F0C4A8" stroke-width="4" stroke-dasharray="3,3" opacity=".8"/>
  <!-- Cat curled up inside (simplified) -->
  <ellipse cx="60" cy="68" rx="14" ry="11" fill="#C8941A" opacity=".7"/>
  <!-- Cat head -->
  <circle cx="60" cy="60" r="7" fill="#E8B84B"/>
  <!-- Cat ears -->
  <polygon points="55,55 52,48 59,53" fill="#E8B84B"/>
  <polygon points="65,55 68,48 61,53" fill="#E8B84B"/>
  <!-- Cat face -->
  <circle cx="57" cy="60" r="1.5" fill="#3D2314"/>
  <circle cx="63" cy="60" r="1.5" fill="#3D2314"/>
  <!-- Tail curl -->
  <path d="M68 72 Q78 65 74 58" stroke="#C8941A" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
