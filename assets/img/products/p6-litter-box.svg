<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Box base -->
  <rect x="15" y="72" width="90" height="28" rx="6" fill="#8FA882"/>
  <rect x="15" y="72" width="90" height="10" rx="3" fill="#6B8C5E"/>
  <!-- Hood/dome top -->
  <path d="M15 75 Q15 22 60 22 Q105 22 105 75 Z" fill="#A8C4A0"/>
  <path d="M15 75 Q15 22 60 22 Q105 22 105 75 Z" fill="none" stroke="#6B8C5E" stroke-width="2"/>
  <!-- Entry door hole -->
  <ellipse cx="60" cy="75" rx="22" ry="16" fill="#FAF5EE"/>
  <ellipse cx="60" cy="75" rx="18" ry="13" fill="#3D2314" opacity=".7"/>
  <ellipse cx="60" cy="75" rx="18" ry="13" fill="url(#darkhole)"/>
  <!-- Carbon filter vent on top -->
  <ellipse cx="60" cy="35" rx="12" ry="6" fill="#6B8C5E"/>
  <rect x="55" y="29" width="10" height="12" rx="3" fill="#3D2314" opacity=".4"/>
  <!-- Paw print on side -->
  <circle cx="85" cy="58" r="5" fill="#6B8C5E" opacity=".5"/>
  <circle cx="80" cy="52" r="2.5" fill="#6B8C5E" opacity=".5"/>
  <circle cx="87" cy="51" r="2.5" fill="#6B8C5E" opacity=".5"/>
  <circle cx="92" cy="54" r="2.5" fill="#6B8C5E" opacity=".5"/>
  <defs>
    <radialGradient id="darkhole" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a0a04;stop-opacity:.8"/>
      <stop offset="100%" style="stop-color:#1a0a04;stop-opacity:0"/>
    </radialGradient>
  </defs>
</svg>
