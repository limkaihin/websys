  <!-- Box side face (3D) -->
  <polygon points="86,38 102,22 102,84 86,100" fill="#C87030"/>
  <!-- Label strip -->
  <rect x="18" y="55" width="68" height="28" fill="#FAF5EE" opacity=".9"/>
