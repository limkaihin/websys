  <ellipse cx="67" cy="62" rx="4" ry="7" fill="#C8A8D8" transform="rotate(20 67 62)"/>
  <!-- "8kg" text area -->
  <rect x="42" y="78" width="36" height="10" rx="5" fill="#8FA882"/>
  <!-- Stars pattern -->
  <circle cx="38" cy="55" r="2" fill="#8FA882" opacity=".5"/>
